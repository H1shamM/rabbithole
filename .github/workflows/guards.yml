name: Guards
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No committed log files
        run: |
          matches=$(git ls-files '*.log')
          if [ -n "$matches" ]; then
            echo "::error::Log files must not be committed:"
            echo "$matches"
            exit 1
          fi
          echo "OK — no committed *.log files."
