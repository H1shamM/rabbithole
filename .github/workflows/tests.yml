name: Tests
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [app, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cd ${{ matrix.dir }} && npm ci
      # Coverage thresholds live in each package's vitest config; the run fails
      # if coverage drops below the committed floor (see docs/WORKFLOW.md).
      - name: Test + coverage
        run: cd ${{ matrix.dir }} && npm test -- --coverage
