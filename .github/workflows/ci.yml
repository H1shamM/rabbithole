name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [app, ui]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: cd ${{ matrix.dir }} && npm ci
      - name: Lint
        run: cd ${{ matrix.dir }} && npm run lint
      - name: Test
        run: cd ${{ matrix.dir }} && if [ -f package.json ] && grep -q '"test":' package.json; then npm test -- --coverage; else echo "No test script, skipping"; fi
